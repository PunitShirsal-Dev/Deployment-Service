spring:
  application:
    name: Deployment-Service

  # Disable Config Server
  config:
    import: "optional:configserver:"

  # Cloud configuration
  cloud:
    # Circuit Breaker Configuration
    circuitbreaker:
      resilience4j:
        enabled: true
        instances:
          dockerClientCircuitBreaker:
            registerHealthIndicator: true
            slidingWindowSize: 100
            minimumNumberOfCalls: 5
            permittedNumberOfCallsInHalfOpenState: 3
            automaticTransitionFromOpenToHalfOpenEnabled: true
            waitDurationInOpenState: 30s
            failureRateThreshold: 50
            eventConsumerBufferSize: 10

          kubernetesClientCircuitBreaker:
            registerHealthIndicator: true
            slidingWindowSize: 100
            minimumNumberOfCalls: 5
            permittedNumberOfCallsInHalfOpenState: 3
            automaticTransitionFromOpenToHalfOpenEnabled: true
            waitDurationInOpenState: 30s
            failureRateThreshold: 50
            eventConsumerBufferSize: 10

          deploymentCircuitBreaker:
            registerHealthIndicator: true
            slidingWindowSize: 100
            minimumNumberOfCalls: 10
            permittedNumberOfCallsInHalfOpenState: 3
            automaticTransitionFromOpenToHalfOpenEnabled: true
            waitDurationInOpenState: 30s
            failureRateThreshold: 50
            eventConsumerBufferSize: 10

    # Eureka Client Configuration
    discovery:
      client:
        enabled: true

    # Config Server Configuration
    config:
      enabled: false
      import-check:
        enabled: false

  # Security Configuration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # Datasource Configuration
  datasource:
    url: jdbc:h2:mem:deploymentdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  # H2 Console Configuration
  h2:
    console:
      enabled: true
      path: /h2-console

  # Actuator Configuration
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers,circuitbreaker-events,env,beans,loggers
  endpoint:
    health:
      show-details: always

  # Logging Configuration
logging:
  level:
    com.netflix.eureka: INFO
    com.netflix.discovery: INFO
    com.spunit: DEBUG
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/deployment-service.log
    max-size: 10MB
    max-history: 30
    total-size-cap: 1GB

# Server Configuration
server:
  port: 8088
  servlet:
    context-path: /api/v1

# Eureka Client Configuration
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
    enabled: true
  instance:
    prefer-ip-address: true
    hostname: localhost
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}

# Management Configuration
management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0

# Deployment Configuration
deployment:
  docker:
    enabled: true
    socket-uri: unix:///var/run/docker.sock
    timeout: 120
  kubernetes:
    enabled: true
    namespace: default
  deployment:
    strategies:
      blue-green:
        enabled: true
        health-check-interval: 30
      canary:
        enabled: true
        initial-traffic: 10
        increment: 10
        interval: 60

