global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'deployment-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['localhost:8088']

  - job_name: 'eureka-server'
    static_configs:
      - targets: ['localhost:8761']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

